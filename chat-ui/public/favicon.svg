<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD700"/>
      <stop offset="50%" style="stop-color:#D4AF37"/>
      <stop offset="100%" style="stop-color:#B8860B"/>
    </linearGradient>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1E5AAF"/>
      <stop offset="100%" style="stop-color:#2AA3A3"/>
    </linearGradient>
  </defs>
  
  <!-- Background Circle -->
  <circle cx="50" cy="50" r="48" fill="#1A1A1A" stroke="url(#goldGrad)" stroke-width="3"/>
  
  <!-- Pyramid -->
  <polygon points="50,15 20,70 80,70" fill="url(#goldGrad)" opacity="0.9"/>
  
  <!-- Eye of Horus simplified -->
  <ellipse cx="50" cy="45" rx="15" ry="10" fill="url(#blueGrad)"/>
  <circle cx="50" cy="45" r="5" fill="#1A1A1A"/>
  <circle cx="50" cy="45" r="2" fill="#D4AF37"/>
  
  <!-- Sun disk -->
  <circle cx="50" cy="20" r="6" fill="url(#goldGrad)"/>
  
  <!-- Chat bubble indication -->
  <path d="M70,75 Q85,75 85,60 Q85,50 70,50 L40,50 Q25,50 25,60 Q25,75 40,75 L55,75 L50,85 Z" 
        fill="url(#blueGrad)" opacity="0.8"/>
  
  <!-- Dots for chat -->
  <circle cx="40" cy="62" r="3" fill="#D4AF37"/>
  <circle cx="55" cy="62" r="3" fill="#D4AF37"/>
  <circle cx="70" cy="62" r="3" fill="#D4AF37"/>
</svg>
